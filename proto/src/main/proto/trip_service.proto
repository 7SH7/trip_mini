syntax = "proto3";

package com.study.grpc;

option java_multiple_files = true;
option java_package = "com.study.grpc.trip";

service TripGrpcService {
  rpc GetTrip (GetTripRequest) returns (GetTripResponse);
  rpc CheckTripExists (CheckTripExistsRequest) returns (CheckTripExistsResponse);
}

message GetTripRequest {
  int64 trip_id = 1;
}

message GetTripResponse {
  int64 id = 1;
  int64 user_id = 2;
  string title = 3;
  string status = 4;
}

message CheckTripExistsRequest {
  int64 trip_id = 1;
}

message CheckTripExistsResponse {
  bool exists = 1;
}
