server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: auth-service
          uri: lb://user-service
          predicates:
            - Path=/api/auth/**

        - id: oauth2-service
          uri: lb://user-service
          predicates:
            - Path=/oauth2/**, /login/oauth2/**

        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**

        - id: trip-service
          uri: lb://trip-service
          predicates:
            - Path=/api/trips/**

        - id: booking-service
          uri: lb://booking-service
          predicates:
            - Path=/api/bookings/**

        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/payments/**

        - id: accommodation-service
          uri: lb://accommodation-service
          predicates:
            - Path=/api/accommodations/**

        - id: subscription-service
          uri: lb://subscription-service
          predicates:
            - Path=/api/subscriptions/**

        - id: feed-service
          uri: lb://feed-service
          predicates:
            - Path=/api/feeds/**

        - id: media-service
          uri: lb://media-service
          predicates:
            - Path=/api/media/**

        - id: chat-service-ws
          uri: lb:ws://chat-service
          predicates:
            - Path=/ws/chat/**

        - id: chat-service
          uri: lb://chat-service
          predicates:
            - Path=/api/chat/**

        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/**

  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: dHJpcC1zZXJ2aWNlLWp3dC1zZWNyZXQta2V5LXRoYXQtaXMtbG9uZy1lbm91Z2gtZm9yLWhtYWMtc2hhMjU2

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
