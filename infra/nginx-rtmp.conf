`worker_processes auto;

events {
    worker_connections 1024;
}

rtmp {
    server {
        listen 1935;

        application live {
            live on;
            on_publish http://host.docker.internal:8088/api/media/live/on-publish;
            on_done http://host.docker.internal:8088/api/media/live/on-done;
            hls on;
            hls_path /tmp/hls;
            hls_fragment 3;
        }
    }
}

http {
    server {
        listen 80;

        location /hls {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            root /tmp;
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin *;
        }
    }
}
